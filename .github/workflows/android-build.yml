name: Android Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (with cache disabled to force clean build)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'
          cache-disabled: true   # ← cache بند کیا تاکہ پرانی خراب شدہ cache استعمال نہ ہو

      - name: Build Debug APK
        run: gradle assembleDebug --no-build-cache   # ← build cache بھی بند

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk